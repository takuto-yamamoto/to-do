<title>To Do リスト</title>
<style>
  :root{
    --bg: #F1F1F5;
    --card-bg: #FFFFFF;
    --text-main: #1C1C1E;
    --text-sub: #8E8E93;
    --line: #E9E9EE;
    --accent: #F5A623;
    --shadow: 0 2px 10px rgba(0,0,0,0.05);
    --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
    --radius: 18px;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  button, .icon-btn, .card, .ccheck, .drow, .dcheck, .mini-add, .mini-cancel, .drawer-item, .swatch, .modal-btn, .fab{
    touch-action: manipulation;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }
  html,body{
    margin:0; padding:0; height:100%;
    background: var(--bg);
    color: var(--text-main);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
    -webkit-overflow-scrolling: touch;
    overflow-x: hidden;
    max-width: 100vw;
  }
  #app{ min-height:100%; padding-bottom: calc(100px + env(safe-area-inset-bottom)); }

  /* ---------- Top bar ---------- */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding: calc(12px + env(safe-area-inset-top)) 16px 4px 16px;
  }
  .icon-btn{
    width:40px; height:40px; display:flex; align-items:center; justify-content:center;
    border:none; background:transparent; cursor:pointer; color:var(--text-main);
    border-radius: 10px; position:relative;
  }
  .icon-btn:active{ background: rgba(0,0,0,0.05); }
  .icon-btn svg{ width:22px; height:22px; }
  .page-title{
    font-size: 15px; font-weight:600; color: var(--text-sub);
    letter-spacing: 0.02em;
  }

  /* ---------- Side drawer ---------- */
  .drawer-backdrop{
    position:fixed; inset:0; background: rgba(0,0,0,0.32); z-index: 40;
    opacity:0; transition: opacity .25s ease; pointer-events:none;
  }
  .drawer-backdrop.open{ opacity:1; pointer-events:auto; }
  .side-drawer{
    position:fixed; top:0; left:0; bottom:0; width:78%; max-width:290px;
    background: var(--card-bg); z-index: 41; box-shadow: var(--shadow-lg);
    transform: translateX(-100%); transition: transform .28s cubic-bezier(.4,0,.2,1);
    padding: calc(26px + env(safe-area-inset-top)) 14px calc(26px + env(safe-area-inset-bottom)) calc(14px + env(safe-area-inset-left));
    display:flex; flex-direction:column; gap:4px;
  }
  .side-drawer.open{ transform: translateX(0); }
  .drawer-title{
    font-size:13px; font-weight:700; color:var(--text-sub); letter-spacing:0.04em;
    padding: 0 10px 16px 10px;
  }
  .drawer-item{
    display:flex; align-items:center; gap:14px; padding:13px 12px; border-radius:12px;
    font-size:15.5px; font-weight:500; color:var(--text-main); cursor:pointer;
  }
  .drawer-item:active{ background:#F1F1F5; }
  .drawer-item.active{ background:#FBEBD2; color:#8A5A12; }
  .drawer-item svg{ width:20px; height:20px; color:var(--text-sub); flex-shrink:0; }
  .drawer-item.active svg{ color:#C98A1E; }

  /* ---------- Log page rows ---------- */
  .log-row{ cursor:default; }
  .log-meta{ display:flex; align-items:center; gap:6px; margin-top:3px; }
  .log-dot{ width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .log-cat{ font-size:11.5px; color:var(--text-sub); }
  .log-date{ font-size:11.5px; color:#C6C6CB; margin-left:auto; padding-right:4px; }
  .log-empty{ padding: 60px 20px; color:#C6C6CB; text-align:center; font-size:14px; }

  /* ---------- Settings page ---------- */
  .settings-group{
    margin: 10px 14px; background: var(--card-bg); border-radius: var(--radius);
    box-shadow: var(--shadow); overflow:hidden;
  }
  .settings-row{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:14px 16px; border-bottom:1px solid var(--line); font-size:15px;
  }
  .settings-row:last-child{ border-bottom:none; }
  .settings-row-label{
    color:var(--text-main); min-width:0; overflow:hidden; text-overflow:ellipsis;
    white-space:nowrap; display:flex; align-items:center;
  }
  .settings-row-value{ color:var(--text-sub); font-size:13.5px; }
  .settings-danger{ color:#E0507A; cursor:pointer; font-weight:600; }
  .settings-danger:active{ opacity:0.6; }
  .settings-section-label{
    font-size:12.5px; font-weight:700; color:var(--text-sub); letter-spacing:0.03em;
    margin: 18px 14px 6px 20px;
  }
  .settings-hint{
    font-size:12px; color:var(--text-sub); line-height:1.5;
    margin: -2px 20px 10px 20px;
  }

  /* ---------- Main grid (masonry: 2 independent columns, shortest gets next card;
     "wide" cards break out and take the full width of both columns) ---------- */
  .grid{
    display:flex;
    flex-direction:column;
    gap: 10px;
    padding: 4px 10px 14px 10px;
  }
  .grid-row{
    display:flex;
    align-items:flex-start;
    gap: 10px;
  }
  .grid-col{
    display:flex;
    flex-direction:column;
    gap: 10px;
    flex: 1 1 0;
    min-width: 0;
  }
  .grid-wide{ width:100%; }
  .grid-wide .card{ width:100%; }
  @media (max-width: 480px){
    .grid{ gap: 8px; padding: 4px 8px 14px 8px; }
    .grid-row{ gap: 8px; }
    .grid-col{ gap: 8px; }
  }
  @media (max-width: 340px){
    .grid-row{ flex-direction:column; }
  }

  .card{
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 12px 12px;
    user-select: none;

<body>
<div id="app"></div>
<button class="fab" id="fabAdd" title="新しいリストを追加">＋</button>

<script>
(function(){
  "use strict";

  var COLORS = ["#F5D949","#F0A020","#6C6FC4","#2FAE8E","#EB5A73","#B9BFC8","#5AC8E0","#9B7EDE"];
  var THIRTY_DAYS_MS = 30 * 24 * 60 * 60 * 1000;
  var STORAGE_KEY = "todo-app-state-v1";

  var state = null;
  var view = { mode: "main", categoryId: null };

  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

  function seedState(){
    /* No personal data baked in — first-time users simply start empty
       and create their own lists. */
    return { categories: [], todos: [] };
  }

  function loadState(cb){
    if (window.storage && typeof window.storage.get === "function") {
      window.storage.get(STORAGE_KEY, false).then(function(res){
        if (res && res.value) {
          try { cb(JSON.parse(res.value)); return; } catch(e){}
        }
        cb(loadFromLocalStorage());
      }).catch(function(){ cb(loadFromLocalStorage()); });
    } else {
      cb(loadFromLocalStorage());
    }
  }

  function loadFromLocalStorage(){
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch(e){}
    return seedState();
  }

  function saveState(){
    if (window.storage && typeof window.storage.set === "function") {
      try {
        window.storage.set(STORAGE_KEY, JSON.stringify(state), false).catch(function(){});
      } catch(e){}
    }
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch(e){}
  }

  function cleanupOldCompleted(){
    var now = Date.now();
    var before = state.todos.length;
    state.todos = state.todos.filter(function(t){
      if (t.completed && t.completedAt && (now - t.completedAt) > THIRTY_DAYS_MS) return false;
      return true;
    });
    return state.todos.length !== before;
  }

  function sortTodos(list){
    var arr = list.slice();
    arr.sort(function(a,b){
      if (a.completed !== b.completed) return a.completed ? 1 : -1;
      if (!a.completed){
        var ad = a.dueDate ? a.dueDate : null;
        var bd = b.dueDate ? b.dueDate : null;
        if (ad && bd){
          if (ad !== bd) return ad < bd ? -1 : 1;
          return (a.order||0) - (b.order||0);
        }
        if (ad && !bd) return -1;
        if (!ad && bd) return 1;
        return (a.order||0) - (b.order||0);
      } else {
        return (b.completedAt||0) - (a.completedAt||0);
      }
    });
    return arr;
  }

  function todosByCategory(catId){
    return state.todos.filter(function(t){ return t.categoryId === catId; });
  }

  function fmtDue(d){
    if (!d) return "";
    var parts = d.split("-");
    if (parts.length !== 3) return d;
    return parseInt(parts[1],10) + "/" + parseInt(parts[2],10);
  }

  function isOverdue(d){
    if (!d) return false;
    var today = new Date(); today.setHours(0,0,0,0);
    var due = new Date(d + "T00:00:00");
    return due < today;
  }

  var restoreSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/></svg>';
  var trashSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>';

  function esc(s){
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  /* ---------------- render main ---------------- */
  var addModeCats = {}; /* catId -> true while its inline "add task" form is open */

  function buildCardHtml(cat){
    var todos = sortTodos(todosByCategory(cat.id).filter(function(t){ return !t.completed; }));
    var html = '';
    html += '<div class="card" data-catid="'+cat.id+'">';
    html += '  <div class="card-header">';
    html += '    <span class="dot" style="background:'+cat.color+'"></span>';
    html += '    <span class="card-title">'+esc(cat.title)+'</span>';
    html += '  </div>';
    html += '  <div class="card-todolist" id="todolist-'+cat.id+'">';
    if (todos.length === 0){
      html += '<div class="empty-hint">タスクなし</div>';
    } else {
      todos.forEach(function(t){
        html += '<div class="ctodo-row" data-id="'+t.id+'">';
        html += '  <span class="ccheck" data-check="'+t.id+'" style="background:'+cat.color+'"></span>';
        html += '  <span class="ctodo-text">'+esc(t.title)+'</span>';
        if (t.dueDate) html += '<span class="ctodo-due'+(isOverdue(t.dueDate) ? ' overdue' : '')+'">'+fmtDue(t.dueDate)+'</span>';
        html += '</div>';
      });
    }
    html += '  </div>';
    html += '  <div class="card-addzone'+(addModeCats[cat.id] ? ' active' : '')+'">';
    if (addModeCats[cat.id]){
      html += '    <input type="text" class="mini-input" id="miniTitle-'+cat.id+'" placeholder="タスクを入力" maxlength="60">';
      html += '    <div class="mini-row2">';
      html += '      <input type="date" class="mini-date" id="miniDate-'+cat.id+'">';
      html += '    </div>';
      html += '    <div class="mini-row3">';
      html += '      <button class="mini-add" id="miniAddBtn-'+cat.id+'">追加</button>';
      html += '      <button class="mini-cancel" id="miniCancelBtn-'+cat.id+'" aria-label="cancel">×</button>';
      html += '    </div>';
    }
    html += '  </div>';
    html += '</div>';
    return html;
  }

  function renderMain(animate){
    var app = document.getElementById("app");
    var cats = state.categories.slice().sort(function(a,b){ return a.order - b.order; });

    var oldRects = {};
    if (animate){
      document.querySelectorAll("#grid .card").forEach(function(c){
        oldRects[c.getAttribute("data-catid")] = c.getBoundingClientRect();
      });
    }

    var html = '';
    html += '<div class="topbar">';
    html += '<button class="icon-btn" id="menuBtn" aria-label="menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg></button>';
    html += '<span class="page-title">To Do</span>';
    html += '<span style="width:40px"></span>';
    html += '</div>';

    html += '<div class="grid" id="grid"></div>';

    app.innerHTML = html;
    document.getElementById("menuBtn").onclick = openDrawer;

    /* Masonry placement: within a run of normal-width cards, each card
       goes into whichever column is currently shorter, so short/tall
       cards pack tightly without leaving a big gap under a short
       neighbor. A "wide" card (cat.wide) breaks out of the two-column
       run entirely and takes the full width on its own row; the two
       columns then start fresh again after it. */
    var grid = document.getElementById("grid");
    var colL = null, colR = null, heightL = 0, heightR = 0;

    function startNewColumnRow(){
      var row = document.createElement("div");
      row.className = "grid-row";
      colL = document.createElement("div"); colL.className = "grid-col";
      colR = document.createElement("div"); colR.className = "grid-col";
      row.appendChild(colL);
      row.appendChild(colR);
      grid.appendChild(row);
      heightL = 0; heightR = 0;
    }

    function placeCard(cat){
      var temp = document.createElement("div");
      temp.innerHTML = buildCardHtml(cat);
      var cardEl = temp.firstElementChild;
      attachCardEvents(cardEl, cardEl.getAttribute("data-catid"));
      return cardEl;
    }

    /* Cards flagged "pinLast" always end up in the very last position
       (bottom-right), regardless of manual reordering, so a category
       like "その他" (misc / catch-all) never gets buried among others
       or moved by a drag. They're rendered after everything else. */
    var normalCats = cats.filter(function(c){ return !c.pinLast; });
    var pinnedCats = cats.filter(function(c){ return c.pinLast; });

    normalCats.forEach(function(cat){
      var cardEl = placeCard(cat);
      if (cat.wide){
        var wideWrap = document.createElement("div");
        wideWrap.className = "grid-wide";
        wideWrap.appendChild(cardEl);
        grid.appendChild(wideWrap);
        colL = null; colR = null; /* next normal card starts a fresh pair */
        return;
      }
      if (!colL) startNewColumnRow();
      if (heightL <= heightR){
        colL.appendChild(cardEl);
      } else {
        colR.appendChild(cardEl);
      }
      var h = cardEl.offsetHeight;
      if (cardEl.parentElement === colL) heightL += h; else heightR += h;
    });

    pinnedCats.forEach(function(cat){
      var cardEl = placeCard(cat);
      if (cat.wide){
        var wideWrap = document.createElement("div");
        wideWrap.className = "grid-wide";
        wideWrap.appendChild(cardEl);
        grid.appendChild(wideWrap);
        colL = null; colR = null;
        return;
      }
      /* Force into the right-hand column of a brand-new row so it
         always lands bottom-right, instead of wherever the shortest-
         column masonry would otherwise put it. */
      startNewColumnRow();
      colR.appendChild(cardEl);
    });

    if (animate){
      document.querySelectorAll("#grid .card").forEach(function(c){
        var id = c.getAttribute("data-catid");
        var old = oldRects[id];
        if (!old) return;
        var nr = c.getBoundingClientRect();
        var dx = old.left - nr.left, dy = old.top - nr.top;
        if (Math.abs(dx) > 1 || Math.abs(dy) > 1){
          c.style.transition = "none";
          c.style.transform = "translate(" + dx + "px," + dy + "px)";
          requestAnimationFrame(function(){
            c.style.transition = "transform 220ms cubic-bezier(.4,0,.2,1)";
            c.style.transform = "";
            setTimeout(function(){ c.style.transition = ""; }, 230);
          });
        }
      });
    }
  }

  /* Re-renders a single card in place (used after check/add/delete)
     so the rest of the grid stays untouched and no navigation happens. */
  function renderCard(catId){
    var card = document.querySelector('.card[data-catid="'+catId+'"]');
    var cat = state.categories.find(function(c){ return c.id === catId; });
    if (!card || !cat) return;
    var temp = document.createElement("div");
    temp.innerHTML = buildCardHtml(cat);
    var newCard = temp.firstElementChild;
    card.replaceWith(newCard);
    attachCardEvents(newCard, catId);
    if (addModeCats[catId]){
      var inp = document.getElementById("miniTitle-"+catId);
      if (inp) inp.focus();
    }
  }

  function attachCardEvents(card, catId){
    card.addEventListener("pointerdown", function(e){
      if (e.target.closest("button, input, [data-check]")) return;
      startCardDrag(e, card, catId);
    });

    card.querySelectorAll(".ctodo-row").forEach(function(row){
      var lastTap = 0;
      row.addEventListener("pointerup", function(e){
        if (e.target.closest("button")) return;
        var now = Date.now();
        if (now - lastTap < 350){
          lastTap = 0;
          completeTodoInline(row.getAttribute("data-id"));
        } else {
          lastTap = now;
        }
      });
    });
    var submitted = false; /* guards against double-submit when blur (from picking
      a date) and the "追加" button click fire for the same interaction */
    function trySubmit(){
      if (submitted) return;
      submitted = true;
      submitInlineAdd(catId);
    }
    var miniAddBtn = card.querySelector("#miniAddBtn-"+catId);
    if (miniAddBtn){
      miniAddBtn.onclick = function(){ trySubmit(); };
    }
    var miniCancelBtn = card.querySelector("#miniCancelBtn-"+catId);
    if (miniCancelBtn){
      miniCancelBtn.onclick = function(){
        delete addModeCats[catId];
        renderCard(catId);
      };
    }
    var miniTitle = card.querySelector("#miniTitle-"+catId);
    if (miniTitle){
      miniTitle.addEventListener("keydown", function(e){
        if (e.key !== "Enter") return;
        e.preventDefault();
        if (!miniTitle.value.trim()) return;
        var dateInput = card.querySelector("#miniDate-"+catId);
        if (dateInput){
          dateInput.focus();
          if (typeof dateInput.showPicker === "function"){
            try { dateInput.showPicker(); } catch(err){}
          }
        } else {
          trySubmit();
        }
      });
    }
    var miniDate = card.querySelector("#miniDate-"+catId);
    if (miniDate){
      var dateEdited = false;
      miniDate.addEventListener("keydown", function(e){
        if (e.key === "Enter"){
          e.preventDefault();
          trySubmit();
        }
      });
      /* Mobile date pickers (notably iOS) can fire multiple "change"
         events while the user is still scrolling the day/month/year
         wheels, each with a partial/intermediate value. Submitting on
         every "change" caused the very first, still-mid-scroll value
         (close to today's date) to be saved before the user finished
         picking. Instead, just remember that a value was picked and
         submit once the field is actually confirmed (blur = picker
         closed / user moved on), so the final chosen date is used.
         trySubmit() also guards against this firing a second time if
         the blur was itself caused by tapping the "追加" button. */
      miniDate.addEventListener("change", function(){
        dateEdited = true;
      });
      miniDate.addEventListener("blur", function(){
        if (dateEdited && miniDate.value){
          dateEdited = false;
          trySubmit();
        }
      });
    }
  }

  /* Moves fromId next to toId. insertAfter=false puts it just above
     (before) toId; insertAfter=true puts it just below (after) toId. */
  function reorderCategories(fromId, toId, insertAfter){
    var cats = state.categories.slice().sort(function(a,b){ return a.order - b.order; });
    var fromIdx = cats.findIndex(function(c){ return c.id === fromId; });
    if (fromIdx < 0) return;
    var moved = cats.splice(fromIdx,1)[0];
    var toIdx = cats.findIndex(function(c){ return c.id === toId; });
    if (toIdx < 0){
      cats.push(moved);
    } else {
      cats.splice(insertAfter ? toIdx+1 : toIdx, 0, moved);
    }
    cats.forEach(function(c,i){ c.order = i; });
    saveState();
    renderMain(true);
  }

  /* Long-press + drag to reorder cards (pointer events: works for touch and mouse). */
  function startCardDrag(e, card, catId){
    var startX = e.clientX, startY = e.clientY;
    var pointerId = e.pointerId;
    var longPress = false;
    var holdTimer = setTimeout(function(){
      longPress = true;
      card.classList.add("dragging");
      try { card.setPointerCapture(pointerId); } catch(err){}
    }, 260);

    function currentTarget(clientX, clientY){
      card.style.pointerEvents = "none";
      var el = document.elementFromPoint(clientX, clientY);
      card.style.pointerEvents = "";
      return el && el.closest ? el.closest(".card") : null;
    }

    var dropInfo = null; /* { targetId, after } — where the card will be inserted */

    function clearDragOverMarks(){
      document.querySelectorAll(".card.drag-over-before, .card.drag-over-after").forEach(function(c){
        c.classList.remove("drag-over-before", "drag-over-after");
      });
    }

    function onMove(ev){
      if (ev.pointerId !== pointerId) return;
      var dx = ev.clientX - startX, dy = ev.clientY - startY;
      if (!longPress){
        if (Math.hypot(dx, dy) > 10){ clearTimeout(holdTimer); cleanup(); }
        return;
      }
      ev.preventDefault();
      card.style.transition = "none";
      card.style.transform = "translate(" + dx + "px," + dy + "px) scale(1.03)";
      clearDragOverMarks();
      var target = currentTarget(ev.clientX, ev.clientY);
      if (target && target !== card){
        var rect = target.getBoundingClientRect();
        var after = (ev.clientY - rect.top) > (rect.height / 2);
        target.classList.add(after ? "drag-over-after" : "drag-over-before");
        dropInfo = { targetId: target.getAttribute("data-catid"), after: after };
      } else {
        dropInfo = null;
      }
    }

    function onUp(ev){
      if (ev.pointerId !== pointerId) return;
      clearTimeout(holdTimer);
      cleanup();
      if (!longPress) return;
      clearDragOverMarks();
      card.classList.remove("dragging");
      card.style.transition = "transform 150ms ease";
      card.style.transform = "";
      setTimeout(function(){ card.style.transition = ""; }, 160);
      if (dropInfo && dropInfo.targetId !== catId){
        reorderCategories(catId, dropInfo.targetId, dropInfo.after);
      }
    }

    function cleanup(){
      document.removeEventListener("pointermove", onMove);
      document.removeEventListener("pointerup", onUp);
      document.removeEventListener("pointercancel", onUp);
    }

    document.addEventListener("pointermove", onMove);
    document.addEventListener("pointerup", onUp);
    document.addEventListener("pointercancel", onUp);
  }

  function deleteCategory(catId){

    saveState();

  }

    if (availableColors.length === 0){
      alert("これ以上リストを追加できません（使える色をすべて使い切りました）");
      return;
    }

    var chosen = availableColors[Math.floor(Math.random()*availableColors.length)];
    var backdrop = document.createElement("div");
    backdrop.className = "modal-backdrop";
    var swatchHtml = availableColors.map(function(c){
      return '<span class="swatch'+(c===chosen?' sel':'')+'" data-color="'+c+'" style="background:'+c+'"></span>';
    }).join('');
    backdrop.innerHTML =
      '<div class="modal">'+
      '  <h3>新しいリスト</h3>'+
      '  <input type="text" id="newCatTitle" placeholder="リスト名" maxlength="20">'+
      '  <div class="swatches" id="swatches">'+swatchHtml+'</div>'+
      '  <div class="modal-actions">'+
      '    <button class="modal-btn cancel" id="catCancel">キャンセル</button>'+
      '    <button class="modal-btn ok" id="catOk">追加</button>'+
      '  </div>'+
      '</div>';
    document.body.appendChild(backdrop);
    var input = backdrop.querySelector("#newCatTitle");
    input.focus();

    backdrop.querySelectorAll(".swatch").forEach(function(sw){
      sw.onclick = function(){
        backdrop.querySelectorAll(".swatch").forEach(function(s){ s.classList.remove("sel"); });
        sw.classList.add("sel");
        chosen = sw.getAttribute("data-color");
      };
    });
    backdrop.querySelector("#catCancel").onclick = function(){ backdrop.remove(); };
    backdrop.addEventListener("click", function(e){ if (e.target === backdrop) backdrop.remove(); });
    backdrop.querySelector("#catOk").onclick = function(){
      var title = input.value.trim();
      if (!title) { input.focus(); return; }
      var maxOrder = state.categories.reduce(function(m,c){ return Math.max(m,c.order); }, -1);
      state.categories.push({ id: uid(), title: title, color: chosen, order: maxOrder+1 });
      saveState();
      backdrop.remove();
      renderMain();
    };
  }

  /* ---------------- init ---------------- */
  loadState(function(loaded){
    state = loaded;
    var changed = cleanupOldCompleted();
    if (changed) saveState();
    renderMain();
    setupFabDrag();
    setupOutsideTapCancel();
  });

  /* Tapping anywhere outside a card that has its add-task form open cancels that form. */
  function setupOutsideTapCancel(){
    document.addEventListener("pointerdown", function(e){
      var openCatIds = Object.keys(addModeCats).filter(function(id){ return addModeCats[id]; });
      if (openCatIds.length === 0) return;
      var clickedCard = e.target.closest ? e.target.closest(".card") : null;
      var clickedCatId = clickedCard ? clickedCard.getAttribute("data-catid") : null;
      openCatIds.forEach(function(catId){
        if (catId !== clickedCatId){
          delete addModeCats[catId];
          renderCard(catId);
        }
      });
    });
  }

  /* FAB: tap -> add new list. Drag onto a card -> open that card's add-task form. */
  function setupFabDrag(){
    var fab = document.getElementById("fabAdd");
    var drag = { active:false, moved:false, startX:0, startY:0, pointerId:null };

    fab.addEventListener("pointerdown", function(e){
      drag.active = true;
      drag.moved = false;
      drag.startX = e.clientX;
      drag.startY = e.clientY;
      drag.pointerId = e.pointerId;
      fab.setPointerCapture(e.pointerId);
      e.preventDefault();
    });

    fab.addEventListener("pointermove", function(e){
      if (!drag.active) return;
      var dx = e.clientX - drag.startX;
      var dy = e.clientY - drag.startY;
      if (!drag.moved && Math.hypot(dx, dy) > 12){
        drag.moved = true;
        fab.classList.add("fab-dragging");
      }
      if (drag.moved){
        fab.style.transform = "translate(" + dx + "px," + dy + "px)";
        document.querySelectorAll(".card.drop-target").forEach(function(c){ c.classList.remove("drop-target"); });
        fab.style.pointerEvents = "none";
        var el = document.elementFromPoint(e.clientX, e.clientY);
        fab.style.pointerEvents = "";
        var card = el && el.closest ? el.closest(".card") : null;
        if (card) card.classList.add("drop-target");
      }
    });

    function finish(e){
      if (!drag.active) return;
      drag.active = false;
      try { fab.releasePointerCapture(drag.pointerId); } catch(err){}
      document.querySelectorAll(".card.drop-target").forEach(function(c){ c.classList.remove("drop-target"); });
      if (drag.moved){
        fab.classList.remove("fab-dragging");
        fab.style.transform = "";
        fab.style.pointerEvents = "none";
        var el = document.elementFromPoint(e.clientX, e.clientY);
        fab.style.pointerEvents = "";
        var card = el && el.closest ? el.closest(".card") : null;
        if (card){
          var catId = card.getAttribute("data-catid");
          addModeCats[catId] = true;
          renderCard(catId);
        }
      } else {
        openAddCategoryModal();
      }
    }

    fab.addEventListener("pointerup", finish);
    fab.addEventListener("pointercancel", function(){
      drag.active = false;
      fab.classList.remove("fab-dragging");
      fab.style.transform = "";
      document.querySelectorAll(".card.drop-target").forEach(function(c){ c.classList.remove("drop-target"); });
    });
  }
})();
</script>
</body>
</html>
