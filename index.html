<title>To Do リスト</title>
<style>
  :root{
    --bg: #F1F1F5;
    --card-bg: #FFFFFF;
    --text-main: #1C1C1E;
    --text-sub: #8E8E93;
    --line: #E9E9EE;
    --accent: #F5A623;
    --success: #2FAE8E;
    --shadow: 0 2px 10px rgba(0,0,0,0.05);
    --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
    --radius: 18px;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  button, .icon-btn, .card, .ccheck, .drow, .dcheck, .mini-add, .mini-cancel, .drawer-item, .swatch, .modal-btn, .fab{
    touch-action: manipulation;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }
  html,body{
    margin:0; padding:0; height:auto; min-height:100%;
    background: var(--bg);
    color: var(--text-main);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
    -webkit-overflow-scrolling: touch;
    overflow-x: hidden;
    max-width: 100vw;
  }
  #app{ min-height:100%; padding-bottom: calc(100px + env(safe-area-inset-bottom)); }

  /* ---------- Top bar ---------- */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding: calc(12px + env(safe-area-inset-top)) 16px 4px 16px;
  }
  .icon-btn{
    width:40px; height:40px; display:flex; align-items:center; justify-content:center;
    border:none; background:transparent; cursor:pointer; color:var(--text-main);
    border-radius: 10px; position:relative;
  }
  .icon-btn:active{ background: rgba(0,0,0,0.05); }
  .icon-btn svg{ width:22px; height:22px; }
  .page-title{
    font-size: 15px; font-weight:600; color: var(--text-sub);
    letter-spacing: 0.02em;
  }

  /* ---------- Side drawer ---------- */
  .drawer-backdrop{
    position:fixed; inset:0; background: rgba(0,0,0,0.32); z-index: 40;
    opacity:0; transition: opacity .25s ease; pointer-events:none;
  }
  .drawer-backdrop.open{ opacity:1; pointer-events:auto; }
  .side-drawer{
    position:fixed; top:0; left:0; bottom:0; width:78%; max-width:290px;
    background: var(--card-bg); z-index: 41; box-shadow: var(--shadow-lg);
    transform: translateX(-100%); transition: transform .28s cubic-bezier(.4,0,.2,1);
    padding: calc(26px + env(safe-area-inset-top)) 14px calc(26px + env(safe-area-inset-bottom)) calc(14px + env(safe-area-inset-left));
    display:flex; flex-direction:column; gap:4px;
  }
  .side-drawer.open{ transform: translateX(0); }
  .drawer-title{
    font-size:13px; font-weight:700; color:var(--text-sub); letter-spacing:0.04em;
    padding: 0 10px 16px 10px;
  }
  .drawer-item{
    display:flex; align-items:center; gap:14px; padding:13px 12px; border-radius:12px;
    font-size:15.5px; font-weight:500; color:var(--text-main); cursor:pointer;
  }
  .drawer-item:active{ background:#F1F1F5; }
  .drawer-item.active{ background:#FBEBD2; color:#8A5A12; }
  .drawer-item svg{ width:20px; height:20px; color:var(--text-sub); flex-shrink:0; }
  .drawer-item.active svg{ color:#C98A1E; }

  /* ---------- Log page rows ---------- */
  .log-row{ cursor:default; }
  .log-meta{ display:flex; align-items:center; gap:6px; margin-top:3px; }
  .log-dot{ width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .log-cat{ font-size:11.5px; color:var(--text-sub); }
  .log-date{ font-size:11.5px; color:#C6C6CB; margin-left:auto; padding-right:4px; }
  .log-empty{ padding: 60px 20px; color:#C6C6CB; text-align:center; font-size:14px; }

  /* ---------- Settings page ---------- */
  .settings-group{
    margin: 10px 14px; background: var(--card-bg); border-radius: var(--radius);
    box-shadow: var(--shadow); overflow:hidden;
  }
  .settings-row{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:14px 16px; border-bottom:1px solid var(--line); font-size:15px;
  }
  .settings-row:last-child{ border-bottom:none; }
  .settings-row-label{
    color:var(--text-main); min-width:0; overflow:hidden; text-overflow:ellipsis;
    white-space:nowrap; display:flex; align-items:center;
  }
  .settings-row-value{ color:var(--text-sub); font-size:13.5px; }
  .settings-danger{ color:#E0507A; cursor:pointer; font-weight:600; }
  .settings-danger:active{ opacity:0.6; }
  .settings-section-label{
    font-size:12.5px; font-weight:700; color:var(--text-sub); letter-spacing:0.03em;
    margin: 18px 14px 6px 20px;
  }
  .settings-hint{
    font-size:12px; color:var(--text-sub); line-height:1.5;
    margin: -2px 20px 10px 20px;
  }

  /* ---------- Main grid (2 independent columns; each card keeps whatever
     side the user dropped it on, top-packed within its column; "wide"
     cards break out and take the full width of both columns) ---------- */
  .grid{
    display:flex;
    flex-direction:column;
    gap: 10px;
    padding: 4px 10px 14px 10px;
  }
  .grid-row{
    display:flex;
    align-items:flex-start;
    gap: 10px;
  }
  .grid-col{
    display:flex;
    flex-direction:column;
    gap: 10px;
    flex: 1 1 0;
    min-width: 0;
  }
  .grid-wide{ width:100%; }
  .grid-wide .card{ width:100%; }
  @media (max-width: 480px){
    .grid{ gap: 8px; padding: 4px 8px 14px 8px; }
    .grid-row{ gap: 8px; }
    .grid-col{ gap: 8px; }
  }
  @media (max-width: 340px){
    .grid-row{ flex-direction:column; }
  }

  .card{
    background: var(--card-bg);
    border-radius: var(--radius);

<script>
  /* Runs immediately (before body paints) so there's no flash of sideways
     content. Re-applied on every resize/orientationchange. Tries the native
     Screen Orientation API first (works in some installed/fullscreen
     contexts); the CSS rotation below is the fallback that actually works
     in a plain mobile browser tab or iOS "Add to Home Screen" app, where
     screen.orientation.lock is not available. */
  (function(){
    if (screen.orientation && screen.orientation.lock){
      screen.orientation.lock("portrait").catch(function(){});
    }
    /* Real device orientation, independent of the on-screen keyboard.
       window.innerWidth/innerHeight shrink when the keyboard opens, which
       can make width > height even while the phone is physically upright —
       that false "landscape" reading is what used to send the page into
       the rotated layout (hidden FAB, unscrollable page) after leaving the
       keyboard open and returning to the app. screen.orientation.type (and
       the window.orientation angle fallback) reflect the actual physical
       rotation and are not affected by the keyboard. */
    function isLandscape(){
      if (screen.orientation && typeof screen.orientation.type === "string"){
        return screen.orientation.type.indexOf("landscape") === 0;
      }
      if (typeof window.orientation === "number"){
        return Math.abs(window.orientation) === 90;
      }
      /* Last-resort fallback only, for browsers with neither API. */
      return window.innerWidth > window.innerHeight;
    }
    function applyOrientationLock(){
      var root = document.documentElement;
      if (!isLandscape()){
        root.classList.remove("force-portrait-cw", "force-portrait-ccw");
        return;
      }
      var angle = 0;
      if (screen.orientation && typeof screen.orientation.angle === "number"){
        angle = screen.orientation.angle;
      } else if (typeof window.orientation === "number"){
        angle = window.orientation;
      }
      var norm = ((angle % 360) + 360) % 360;
      if (norm === 270){
        root.classList.remove("force-portrait-cw");
        root.classList.add("force-portrait-ccw");
      } else {
        root.classList.remove("force-portrait-ccw");
        root.classList.add("force-portrait-cw");
      }
    }
    window.addEventListener("orientationchange", function(){ setTimeout(applyOrientationLock, 60); });
    window.addEventListener("resize", applyOrientationLock);
    /* Self-heal: whenever the app becomes visible again (returning from
       background/another tab without a full reload), re-evaluate. This
       guards against any stale rotated state left over from before the
       app was backgrounded. */
    document.addEventListener("visibilitychange", function(){
      if (!document.hidden) applyOrientationLock();
    });
    window.addEventListener("pageshow", applyOrientationLock);
    if (screen.orientation && typeof screen.orientation.addEventListener === "function"){
      screen.orientation.addEventListener("change", function(){ setTimeout(applyOrientationLock, 60); });
    }
    applyOrientationLock();
  })();
</script>

<script>
(function(){
  "use strict";

  var COLORS = ["#F5D949","#F0A020","#6C6FC4","#2FAE8E","#EB5A73","#B9BFC8","#5AC8E0","#9B7EDE"];
  var THIRTY_DAYS_MS = 30 * 24 * 60 * 60 * 1000;
  var STORAGE_KEY = "todo-app-state-v1";

  var state = null;
  var view = { mode: "main", categoryId: null };

  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

  function seedState(){
    /* No personal data baked in — first-time users simply start empty
       and create their own lists. */
    return { categories: [], todos: [] };
  }

  function loadState(cb){
    if (window.storage && typeof window.storage.get === "function") {
      window.storage.get(STORAGE_KEY, false).then(function(res){
        if (res && res.value) {
          try { cb(JSON.parse(res.value)); return; } catch(e){}
        }
        cb(loadFromLocalStorage());
      }).catch(function(){ cb(loadFromLocalStorage()); });
    } else {
      cb(loadFromLocalStorage());
    }
  }

  function loadFromLocalStorage(){
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch(e){}
    return seedState();
  }

  function saveState(){
    if (window.storage && typeof window.storage.set === "function") {
      try {
        window.storage.set(STORAGE_KEY, JSON.stringify(state), false).catch(function(){});
      } catch(e){}
    }
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch(e){}

    var now = Date.now();
    var before = state.todos.length;
    state.todos = state.todos.filter(function(t){

      return true;
    });
    return state.todos.length !== before;

    var arr = list.slice();

      if (a.completed !== b.completed) return a.completed ? 1 : -1;
      if (!a.completed){
        var ad = a.dueDate ? a.dueDate : null;
        var bd = b.dueDate ? b.dueDate : null;

        if (!ad && bd) return 1;
        return (a.order||0) - (b.order||0);

        return (b.completedAt||0) - (a.completedAt||0);

  var trashSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>';

  function buildCardHtml(cat){

    var html = '';

        html += '<div class="ctodo-row" data-id="'+t.id+'">';
        html += '  <span class="ccheck" data-check="'+t.id+'" style="background:'+cat.color+'"></span>';
        html += '  <span class="ctodo-text">'+esc(t.title)+'</span>';
        if (t.dueDate) html += '<span class="ctodo-due'+(isOverdue(t.dueDate) ? ' overdue' : '')+'">'+fmtDue(t.dueDate)+'</span>';
        html += '</div>';
      });
    }
    html += '  </div>';
    html += '  <div class="card-addzone'+(addModeCats[cat.id] ? ' active' : '')+'">';
    if (addModeCats[cat.id]){
      html += '    <input type="text" class="mini-input" id="miniTitle-'+cat.id+'" placeholder="タスクを入力" maxlength="60" enterkeyhint="next" autocomplete="off" autocorrect="off">';
      html += '    <div class="mini-row2">';
      html += '      <input type="date" class="mini-date" id="miniDate-'+cat.id+'" enterkeyhint="done">';
      html += '    </div>';
      html += '    <div class="mini-row3">';
      html += '      <button class="mini-add" id="miniAddBtn-'+cat.id+'">追加</button>';
      html += '      <button class="mini-cancel" id="miniCancelBtn-'+cat.id+'" aria-label="cancel">×</button>';
      html += '    </div>';
    }
    html += '  </div>';
    html += '</div>';
    return html;
  }

  function renderMain(animate){
    var app = document.getElementById("app");
    var cats = state.categories.slice().sort(function(a,b){ return a.order - b.order; });

    var oldRects = {};
    if (animate){
      document.querySelectorAll("#grid .card").forEach(function(c){
        oldRects[c.getAttribute("data-catid")] = c.getBoundingClientRect();
      });
    }

    var html = '';
    html += '<div class="topbar">';
    html += '<button class="icon-btn" id="menuBtn" aria-label="menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg></button>';
    html += '<span class="page-title">To Do</span>';
    html += '<span style="width:40px"></span>';
    html += '</div>';

    html += '<div class="grid" id="grid"></div>';

    app.innerHTML = html;
    document.getElementById("menuBtn").onclick = openDrawer;

    /* Two-column placement: within a run of normal-width cards, each card
       stays in whichever column (cat.col: 0=left, 1=right) the user last
       dropped it into, so left/right counts can differ freely. Cards with
       no side chosen yet (new/legacy) get a sensible default. A "wide"
       card (cat.wide) breaks out of the two-column run entirely and takes
       the full width on its own row; the two columns then start fresh
       again after it. */
    var grid = document.getElementById("grid");
    var colL = null, colR = null, runLeftCount = 0, runRightCount = 0;
    var colAssigned = false; /* true if we had to auto-assign a .col to any
      legacy/new card during this render; triggers a single saveState() so
      that placement stays put on the next render instead of drifting. */

    function startNewColumnRow(){
      var row = document.createElement("div");
      row.className = "grid-row";
      colL = document.createElement("div"); colL.className = "grid-col";
      colR = document.createElement("div"); colR.className = "grid-col";
      row.appendChild(colL);
      row.appendChild(colR);
      grid.appendChild(row);
      runLeftCount = 0; runRightCount = 0;
    }

    function placeCard(cat){
      var temp = document.createElement("div");
      temp.innerHTML = buildCardHtml(cat);
      var cardEl = temp.firstElementChild;
      attachCardEvents(cardEl, cardEl.getAttribute("data-catid"));
      return cardEl;
    }

    /* Cards flagged "pinLast" always end up in the very last position
       (bottom-right), regardless of manual reordering, so a category
       like "その他" (misc / catch-all) never gets buried among others
       or moved by a drag. They're rendered after everything else. */
    var normalCats = cats.filter(function(c){ return !c.pinLast; });
    var pinnedCats = cats.filter(function(c){ return c.pinLast; });

    normalCats.forEach(function(cat){
      var cardEl = placeCard(cat);
      if (cat.wide){
        var wideWrap = document.createElement("div");
        wideWrap.className = "grid-wide";
        wideWrap.appendChild(cardEl);
        grid.appendChild(wideWrap);
        colL = null; colR = null; /* next normal card starts a fresh pair */
        return;
      }
      if (!colL) startNewColumnRow();
      var col = cat.col;
      if (col !== 0 && col !== 1){
        /* Legacy/new card with no explicit side yet: give it a sensible
           default (whichever side has fewer cards so far in this run),
           then remember that choice so it stays there from now on
           instead of being recomputed every render. */
        col = (runLeftCount <= runRightCount) ? 0 : 1;
        cat.col = col;
        colAssigned = true;
      }
      if (col === 0){ colL.appendChild(cardEl); runLeftCount++; }
      else { colR.appendChild(cardEl); runRightCount++; }
    });

    if (colAssigned) saveState();

    pinnedCats.forEach(function(cat){
      var cardEl = placeCard(cat);
      if (cat.wide){
        var wideWrap = document.createElement("div");
        wideWrap.className = "grid-wide";
        wideWrap.appendChild(cardEl);
        grid.appendChild(wideWrap);
        colL = null; colR = null;
        return;
      }
      /* Always the right-hand column (so it lands bottom-right), but
         appended to whatever column layout is already there instead of
         forcing a brand-new row — starting a fresh row would leave an
         empty left column next to it, and since a new row begins right
         after the previous one regardless of how uneven the two
         columns were, that leftover height difference would show up
         as an odd gap right before this card. Continuing the same
         column keeps it flush after the last item. */
      if (!colL) startNewColumnRow();
      colR.appendChild(cardEl);
    });

    if (animate){
      document.querySelectorAll("#grid .card").forEach(function(c){
        var id = c.getAttribute("data-catid");
        var old = oldRects[id];
        if (!old) return;
        var nr = c.getBoundingClientRect();
        var dx = old.left - nr.left, dy = old.top - nr.top;
        if (Math.abs(dx) > 1 || Math.abs(dy) > 1){
          c.style.transition = "none";
          c.style.transform = "translate(" + dx + "px," + dy + "px)";
          requestAnimationFrame(function(){
            c.style.transition = "transform 220ms cubic-bezier(.4,0,.2,1)";
            c.style.transform = "";
            setTimeout(function(){ c.style.transition = ""; }, 230);
          });
        }
      });
    }
  }

  /* Re-renders a single card in place (used after check/add/delete)
     so the rest of the grid stays untouched and no navigation happens. */
  function renderCard(catId){
    var card = document.querySelector('.card[data-catid="'+catId+'"]');
    var cat = state.categories.find(function(c){ return c.id === catId; });
    if (!card || !cat) return;
    var temp = document.createElement("div");
    temp.innerHTML = buildCardHtml(cat);
    var newCard = temp.firstElementChild;
    card.replaceWith(newCard);
    attachCardEvents(newCard, catId);
    if (addModeCats[catId]){
      var inp = document.getElementById("miniTitle-"+catId);
      if (inp) inp.focus();
    }
  }

  function attachCardEvents(card, catId){
    card.addEventListener("pointerdown", function(e){
      if (e.target.closest("button, input, [data-check]")) return;
      startCardDrag(e, card, catId);
    });

    card.querySelectorAll(".ctodo-row").forEach(function(row){
      var lastTap = 0;
      row.addEventListener("pointerup", function(e){
        if (e.target.closest("button")) return;
        var now = Date.now();
        if (now - lastTap < 350){
          lastTap = 0;
          completeTodoInline(row.getAttribute("data-id"));
        } else {
          lastTap = now;
        }
      });
    });
    var submitted = false; /* guards against double-submit when blur (from picking
      a date) and the "追加" button click fire for the same interaction */
    function trySubmit(){
      if (submitted) return;
      submitted = true;
      submitInlineAdd(catId);
    }
    var miniAddBtn = card.querySelector("#miniAddBtn-"+catId);
    if (miniAddBtn){
      miniAddBtn.onclick = function(){ trySubmit(); };
    }
    var miniCancelBtn = card.querySelector("#miniCancelBtn-"+catId);
    if (miniCancelBtn){
      miniCancelBtn.onclick = function(){
        delete addModeCats[catId];
        renderCard(catId);
      };
    }
    var miniTitle = card.querySelector("#miniTitle-"+catId);
    if (miniTitle){
      miniTitle.addEventListener("keydown", function(e){
        if (e.key !== "Enter") return;
        e.preventDefault();
        if (!miniTitle.value.trim()) return;
        var dateInput = card.querySelector("#miniDate-"+catId);
        if (dateInput){
          dateInput.focus();
          if (typeof dateInput.showPicker === "function"){
            try { dateInput.showPicker(); } catch(err){}
          }
        } else {
          trySubmit();
        }
      });
    }
    var miniDate = card.querySelector("#miniDate-"+catId);
    if (miniDate){
      var dateEdited = false;
      miniDate.addEventListener("keydown", function(e){
        if (e.key === "Enter"){
          e.preventDefault();
          trySubmit();
        }
      });
      /* Mobile date pickers (notably iOS) can fire multiple "change"
         events while the user is still scrolling the day/month/year
         wheels, each with a partial/intermediate value. Submitting on
         every "change" caused the very first, still-mid-scroll value
         (close to today's date) to be saved before the user finished
         picking. Instead, just remember that a value was picked and
         submit once the field is actually confirmed (blur = picker
         closed / user moved on), so the final chosen date is used.
         trySubmit() also guards against this firing a second time if
         the blur was itself caused by tapping the "追加" button. */
      miniDate.addEventListener("change", function(){
        dateEdited = true;
      });
      miniDate.addEventListener("blur", function(){
        if (dateEdited && miniDate.value){
          dateEdited = false;
          trySubmit();
        }
      });
    }
  }

  function completeTodoInline(id){
    var t = state.todos.find(function(x){ return x.id === id; });
    if (!t || t.completed) return;
    var catId = t.categoryId;
    var row = document.querySelector('.ctodo-row[data-id="'+id+'"]');
    if (row && row.classList.contains("completing")) return; /* animation already in flight
      for this row — an extra rapid tap landing before it finishes must not restart it */
    function apply(){
      t.completed = true;
      t.completedAt = Date.now();
      saveState();
      renderCard(catId);
    }
    if (row){
      if (navigator.vibrate){ try{ navigator.vibrate(15); }catch(err){} }
      var checkEl = row.querySelector(".ccheck");
      if (checkEl) checkEl.innerHTML = checkDoneSvg;
      row.classList.add("completing");
      /* Let the checkmark/strike-through play out fully before the row
         collapses, so the "done" state is clearly seen rather than just
         a quick fade — this is the visible confirmation the tap landed. */
      setTimeout(function(){
        var h = row.getBoundingClientRect().height;
        row.style.height = h + "px";
        row.style.overflow = "hidden";
        row.style.willChange = "height, opacity";
        requestAnimationFrame(function(){
          row.style.transition = "height 220ms ease, opacity 220ms ease, padding 220ms ease, margin 220ms ease";
          row.style.height = "0px";
          row.style.opacity = "0";
          row.style.paddingTop = "0px";
          row.style.paddingBottom = "0px";
          row.style.marginTop = "0px";
          row.style.marginBottom = "0px";
        });
        setTimeout(apply, 230);
      }, 480);
    } else {
      apply();
    }
  }

  function deleteTodoInline(id){
    var t = state.todos.find(function(x){ return x.id === id; });
    if (!t) return;
    var catId = t.categoryId;
    var row = document.querySelector('.ctodo-row[data-id="'+id+'"]');
    function apply(){
      state.todos = state.todos.filter(function(x){ return x.id !== id; });
      saveState();
      renderCard(catId);
    }
    if (row){
      row.style.transition = "opacity 150ms ease, transform 150ms ease";
      row.style.opacity = "0";
      row.style.transform = "translateX(14px)";
      setTimeout(apply, 150);
    } else {
      apply();
    }
  }

  function submitInlineAdd(catId){
    var titleInput = document.getElementById("miniTitle-"+catId);
    var dateInput = document.getElementById("miniDate-"+catId);
    var title = titleInput.value.trim();
    if (!title){ titleInput.focus(); return; }
    var maxOrder = state.todos.filter(function(t){ return t.categoryId === catId; })
      .reduce(function(m,t){ return Math.max(m, t.order||0); }, -1);
    state.todos.push({
      id: uid(), categoryId: catId, title: title, dueDate: dateInput.value || "",
      completed: false, completedAt: null, order: maxOrder + 1
    });
    saveState();
    renderCard(catId);
  }

  function closeLog(){
    view.mode = "main";
    var existing = document.getElementById("logPage");
    if (existing) existing.classList.remove("open");
    renderMain();
    setTimeout(function(){
      if (existing) existing.remove();
    }, 280);
  }

  function fmtLogDate(ts){
    if (!ts) return "";
    var d = new Date(ts);
    return (d.getMonth()+1) + "/" + d.getDate();
  }

  function renderLogList(animate){
    var container = document.getElementById("logList");
    if (!container) return;
    if (animate === undefined) animate = true;

    var oldRects = {};
    if (animate){
      container.querySelectorAll(".drow").forEach(function(r){
        oldRects[r.getAttribute("data-id")] = r.getBoundingClientRect();
      });
    }

    var completed = state.todos.filter(function(t){ return t.completed; })
      .sort(function(a,b){ return (b.completedAt||0) - (a.completedAt||0); });

    var html = '';
    if (completed.length === 0){
      html = '<div class="log-empty">まだ完了したタスクはありません。</div>';
    } else {
      completed.forEach(function(t){
        var cat = state.categories.find(function(c){ return c.id === t.categoryId; });
        html += '<div class="drow log-row" data-id="'+t.id+'">';
        html += '  <span class="dcheck restore" data-undo="'+t.id+'" aria-label="未完了に戻す">'+restoreSvg+'</span>';
        html += '  <div class="dtext-wrap">';
        html += '    <div class="dtitle">'+esc(t.title)+'</div>';
        html += '    <div class="log-meta">';
        if (cat){
          html += '<span class="log-dot" style="background:'+cat.color+'"></span><span class="log-cat">'+esc(cat.title)+'</span>';
        }
        html += '<span class="log-date">'+fmtLogDate(t.completedAt)+' 完了</span>';
        html += '    </div>';
        html += '  </div>';
        html += '  <button class="drow-del log-del" data-deltodo="'+t.id+'" aria-label="完全に削除">'+trashSvg+'</button>';
        html += '</div>';
      });
    }
    container.innerHTML = html;

    container.querySelectorAll("[data-undo]").forEach(function(el){
      el.onclick = function(){
        undoTodo(el.getAttribute("data-undo"));
      };
    });
    container.querySelectorAll("[data-deltodo]").forEach(function(el){
      el.onclick = function(e){
        e.stopPropagation();
        deleteTodoFromLog(el.getAttribute("data-deltodo"));
      };
    });

    if (animate){
      container.querySelectorAll(".drow").forEach(function(r){
        var id = r.getAttribute("data-id");
        var old = oldRects[id];
        if (old){
          var nr = r.getBoundingClientRect();
          var dy = old.top - nr.top;
          if (Math.abs(dy) > 1){
            r.style.transition = "none";
            r.style.transform = "translateY(" + dy + "px)";
            requestAnimationFrame(function(){
              r.style.transition = "transform 220ms cubic-bezier(.4,0,.2,1)";
              r.style.transform = "";
            });
          }
        }
      });
    }
  }

  function undoTodo(id){
    var t = state.todos.find(function(x){ return x.id === id; });
    if (!t) return;
    var row = document.querySelector('#logList .drow[data-id="'+id+'"]');
    function apply(){
      t.completed = false;
      t.completedAt = null;
      saveState();
      renderLogList();
    }
    if (row){
      row.style.transition = "opacity 150ms ease, transform 150ms ease";
      row.style.opacity = "0";
      row.style.transform = "translateX(-20px)";
      setTimeout(apply, 150);
    } else {
      apply();
    }
  }

  function deleteTodoFromLog(id){
    var row = document.querySelector('#logList .drow[data-id="'+id+'"]');
    function apply(){
      state.todos = state.todos.filter(function(x){ return x.id !== id; });
      saveState();
      renderLogList();
    }
    if (row){
      row.style.transition = "opacity 150ms ease, transform 150ms ease";
      row.style.opacity = "0";
      row.style.transform = "translateX(20px)";
      setTimeout(apply, 150);
    } else {
      apply();
    }
  }

  /* Moves fromId next to toId. insertAfter=false puts it just above
     (before) toId; insertAfter=true puts it just below (after) toId. */
  function reorderCategories(fromId, toId, insertAfter, col){
    var cats = state.categories.slice().sort(function(a,b){ return a.order - b.order; });
    var fromIdx = cats.findIndex(function(c){ return c.id === fromId; });
    if (fromIdx < 0) return;
    var moved = cats.splice(fromIdx,1)[0];
    var toIdx = cats.findIndex(function(c){ return c.id === toId; });
    if (toIdx < 0){
      cats.push(moved);
    } else {
      cats.splice(insertAfter ? toIdx+1 : toIdx, 0, moved);
    }
    cats.forEach(function(c,i){ c.order = i; });
    /* Which column (left/right) the card was actually dropped into is
       tracked separately from ordering, so the two counts no longer
       need to match: dropping always honors the exact side the user
       let go on, instead of being re-balanced by height afterward. */
    if ((col === 0 || col === 1) && !moved.wide) moved.col = col;
    saveState();
    renderMain(true);
  }

  /* Long-press + drag to reorder cards (pointer events: works for touch and mouse). */
  function startCardDrag(e, card, catId){
    var startX = e.clientX, startY = e.clientY;
    var curX = startX, curY = startY;
    var pointerId = e.pointerId;
    var longPress = false;
    var abandoned = false; /* real finger movement happened before long-press was confirmed:
                               this is an ordinary scroll swipe, so we get out of the way entirely
                               and let the browser's native touch-action:pan-y scrolling handle it
                               (no manual scrollBy/momentum — nothing beats native for smoothness) */
    var placeholder = null;
    var lastTargetId = null, lastAfter = null, lastDirectCol = null;

    function enterMoveMode(){
      /* The hold timer fires purely on elapsed time, so a slow, deliberate
         scroll swipe (real finger movement, just under the 10px snap
         threshold below) could otherwise still be sitting here 260ms in
         and get hijacked into card-reorder mode. Re-check actual movement
         at fire time: any real movement means this is a scroll, not a
         long-press, no matter how slowly it started. Crucially, at this
         point native scrolling has NOT started yet (the finger has been
         essentially still), so switching this card to touch-action:none
         now reliably suppresses it for the drag that's about to begin. */
      if (Math.hypot(curX - startX, curY - startY) > 6){
        abandoned = true;
        return;
      }
      longPress = true;
      card.style.touchAction = "none";
      var cardHeight = card.getBoundingClientRect().height;
      try { card.setPointerCapture(pointerId); } catch(err){}
      /* Immediate "lift" feedback right as move mode begins, before any
         finger movement, so it's clear the card has been picked up. */
      card.classList.add("dragging");
      card.style.transition = "transform 120ms ease";
      card.style.transform = "scale(1.045)";
      setTimeout(function(){ if (longPress) card.style.transition = "none"; }, 130);
      if (navigator.vibrate) { try { navigator.vibrate(12); } catch(err){} }

      placeholder = document.createElement("div");
      placeholder.className = "drop-placeholder";
      placeholder.style.height = cardHeight + "px";
    }

    var holdTimer = setTimeout(enterMoveMode, 260);

    /* Which side (0 = left, 1 = right) a .grid-col belongs to within its row. */
    function colIndexOf(el){
      var colEl = el && el.closest ? el.closest(".grid-col") : null;
      if (!colEl) return null;
      var row = colEl.closest(".grid-row");
      if (!row) return null;
      var cols = row.querySelectorAll(".grid-col");
      return cols[0] === colEl ? 0 : 1;
    }

    function findTargetCard(clientX, clientY){
      card.style.pointerEvents = "none";
      var el = document.elementFromPoint(clientX, clientY);
      card.style.pointerEvents = "";
      if (!el || !el.closest) return null;
      var targetCard = el.closest(".card");
      if (targetCard && targetCard !== card){
        return { el: targetCard, col: colIndexOf(targetCard) };
      }
      /* Also allow dropping in the empty space below the last card of
         a column (e.g. a short right column next to a tall left one),
         and dropping into a column that has no cards in it at all —
         left/right no longer need to hold equal counts, so a column
         can be completely empty and still be a valid drop target. */
      var col = el.closest(".grid-col");
      if (col){
        var cards = col.querySelectorAll(".card");
        var last = cards[cards.length - 1];
        if (last && last !== card){
          return { el: last, after: true, col: colIndexOf(col) };
        }
        var row = col.closest(".grid-row");
        if (row){
          var otherCol = Array.prototype.filter.call(row.querySelectorAll(".grid-col"), function(c){ return c !== col; })[0];
          var otherLast = otherCol ? otherCol.querySelector(".card:last-child") : null;
          if (otherLast && otherLast !== card){
            /* Anchor to the neighboring column's last card (for ordering
               purposes only) but force it onto the empty side the user
               is actually hovering over. directCol is used below to draw
               the placeholder inside the actually-empty column, instead
               of showing it in the neighboring column by mistake. */
            return { el: otherLast, after: true, col: colIndexOf(col), directCol: col };
          }
        }
      }
      return null;
    }

    function placePlaceholder(target, after){
      if (lastTargetId === target.getAttribute("data-catid") && lastAfter === after && !lastDirectCol) return;
      lastTargetId = target.getAttribute("data-catid");
      lastAfter = after;
      lastDirectCol = null;
      var parent = target.parentElement;
      if (after){
        parent.insertBefore(placeholder, target.nextSibling);
      } else {
        parent.insertBefore(placeholder, target);
      }
      placeholder.classList.remove("show");
      requestAnimationFrame(function(){ placeholder.classList.add("show"); });
    }

    function placePlaceholderInColumn(colEl){
      if (lastDirectCol === colEl) return;
      lastTargetId = null; lastAfter = null;
      lastDirectCol = colEl;
      colEl.appendChild(placeholder);
      placeholder.classList.remove("show");
      requestAnimationFrame(function(){ placeholder.classList.add("show"); });
    }

    function removePlaceholder(){
      if (placeholder && placeholder.parentNode) placeholder.parentNode.removeChild(placeholder);
      lastTargetId = null; lastAfter = null; lastDirectCol = null;
    }

    var dropInfo = null; /* { targetId, after } — where the card will be inserted */

    function onMove(ev){
      if (ev.pointerId !== pointerId) return;
      curX = ev.clientX; curY = ev.clientY;
      var dx = ev.clientX - startX, dy = ev.clientY - startY;

      if (abandoned) return; /* let the browser's native scroll run, untouched */

      if (!longPress){
        if (Math.hypot(dx, dy) > 10){
          clearTimeout(holdTimer);
          abandoned = true;
        }
        return;
      }
      ev.preventDefault();
      card.style.transition = "none";
      card.style.transform = "translate(" + dx + "px," + dy + "px) scale(1.045)";
      var target = findTargetCard(ev.clientX, ev.clientY);
      if (target){
        var rect = target.el.getBoundingClientRect();
        var after = ("after" in target) ? target.after : (ev.clientY - rect.top) > (rect.height / 2);
        if (target.directCol){
          placePlaceholderInColumn(target.directCol);
        } else {
          placePlaceholder(target.el, after);
        }
        dropInfo = { targetId: target.el.getAttribute("data-catid"), after: after, col: target.col };
      } else {
        removePlaceholder();
        dropInfo = null;
      }
    }

    function onUp(ev){
      if (ev.pointerId !== pointerId) return;
      clearTimeout(holdTimer);
      cleanup();
      if (!longPress) return;
      card.style.touchAction = "";
      removePlaceholder();
      card.classList.remove("dragging");
      card.style.transition = "transform 150ms ease";
      card.style.transform = "";
      setTimeout(function(){ card.style.transition = ""; }, 160);
      if (dropInfo && dropInfo.targetId !== catId){
        reorderCategories(catId, dropInfo.targetId, dropInfo.after, dropInfo.col);
      }
    }

    function cleanup(){
      document.removeEventListener("pointermove", onMove);
      document.removeEventListener("pointerup", onUp);
      document.removeEventListener("pointercancel", onUp);
    }

    document.addEventListener("pointermove", onMove);
    document.addEventListener("pointerup", onUp);
    document.addEventListener("pointercancel", onUp);
  }

  function deleteCategory(catId){
    state.categories = state.categories.filter(function(c){ return c.id !== catId; });
    state.todos = state.todos.filter(function(t){ return t.categoryId !== catId; });
    saveState();
    renderMain();
  }

  /* ---------------- modal: add category ---------------- */
  function openAddCategoryModal(){
    var usedColors = state.categories.map(function(c){ return c.color; });
    var availableColors = COLORS.filter(function(c){ return usedColors.indexOf(c) === -1; });

    if (availableColors.length === 0){
      alert("これ以上リストを追加できません（使える色をすべて使い切りました）");
      return;
    }

    var chosen = availableColors[Math.floor(Math.random()*availableColors.length)];
    var backdrop = document.createElement("div");
    backdrop.className = "modal-backdrop";
    var swatchHtml = availableColors.map(function(c){
      return '<span class="swatch'+(c===chosen?' sel':'')+'" data-color="'+c+'" style="background:'+c+'"></span>';
    }).join('');
    backdrop.innerHTML =
      '<div class="modal">'+
      '  <h3>新しいリスト</h3>'+
      '  <input type="text" id="newCatTitle" placeholder="リスト名" maxlength="20" enterkeyhint="done" autocomplete="off" autocorrect="off">'+
      '  <div class="swatches" id="swatches">'+swatchHtml+'</div>'+
      '  <div class="modal-actions">'+
      '    <button class="modal-btn cancel" id="catCancel">キャンセル</button>'+
      '    <button class="modal-btn ok" id="catOk">追加</button>'+
      '  </div>'+
      '</div>';
    document.body.appendChild(backdrop);
    var input = backdrop.querySelector("#newCatTitle");
    input.focus();

    backdrop.querySelectorAll(".swatch").forEach(function(sw){
      sw.onclick = function(){
        backdrop.querySelectorAll(".swatch").forEach(function(s){ s.classList.remove("sel"); });
        sw.classList.add("sel");
        chosen = sw.getAttribute("data-color");
      };
    });
    backdrop.querySelector("#catCancel").onclick = function(){ backdrop.remove(); };
    backdrop.addEventListener("click", function(e){ if (e.target === backdrop) backdrop.remove(); });
    function confirmAdd(){
      var title = input.value.trim();
      if (!title) { input.focus(); return; }
      var maxOrder = state.categories.reduce(function(m,c){ return Math.max(m,c.order); }, -1);
      state.categories.push({ id: uid(), title: title, color: chosen, order: maxOrder+1 });
      saveState();
      backdrop.remove();
      renderMain();
    }
    input.addEventListener("keydown", function(e){
      if (e.key === "Enter"){ e.preventDefault(); confirmAdd(); }
    });
    backdrop.querySelector("#catOk").onclick = confirmAdd;
  }

  /* ---------------- init ---------------- */
  /* ---------------- keyboard-aware focus handling ---------------- */
  /* Applies to every text/date field in the app (inline card add-form,
     new-list modal, etc.):
     - hides the FAB while typing, so it doesn't sit on top of the keyboard
     - nudges the focused field above the keyboard once it's finished
       animating in, since iOS doesn't do this on its own for fields that
       are already on-screen but low in the viewport
     - anchors the "new list" modal near the top instead of centered, so
       typing there doesn't push its buttons behind the keyboard */
  (function(){
    function isTextField(el){
      return el && (el.tagName === "INPUT" || el.tagName === "TEXTAREA");
    }
    document.addEventListener("focusin", function(e){
      if (!isTextField(e.target)) return;
      document.body.classList.add("keyboard-open");
      var modal = e.target.closest(".modal-backdrop");
      if (modal) modal.classList.add("kb-open");
      var el = e.target;
      setTimeout(function(){
        if (document.activeElement === el){
          el.scrollIntoView({ block: "center", behavior: "smooth" });
        }
      }, 320); /* rough duration of the iOS keyboard show animation */
    });
    document.addEventListener("focusout", function(e){
      if (!isTextField(e.target)) return;
      setTimeout(function(){
        var active = document.activeElement;
        if (!isTextField(active)){
          document.body.classList.remove("keyboard-open");
          document.querySelectorAll(".modal-backdrop.kb-open").forEach(function(m){
            m.classList.remove("kb-open");
          });
        }
      }, 50);
    });
    /* Self-heal: if the app is backgrounded while a field is focused, iOS
       doesn't always fire focusout before/after the suspend. Without this,
       "keyboard-open" can stay stuck on body, leaving the FAB permanently
       invisible (opacity:0, pointer-events:none) after returning to the
       app even though the keyboard isn't actually showing. */
    document.addEventListener("visibilitychange", function(){
      if (document.hidden) return;
      if (!isTextField(document.activeElement)){
        document.body.classList.remove("keyboard-open");
        document.querySelectorAll(".modal-backdrop.kb-open").forEach(function(m){
          m.classList.remove("kb-open");
        });
      }
    });
  })();

  /* Ask the browser to treat this site's storage as persistent, so data
     isn't silently evicted under storage pressure (e.g. on iOS/Android
     home-screen web apps or long periods of disuse). This is a request,
     not a guarantee — the browser may still say no depending on its own
     heuristics (site engagement, installed-as-app status, etc.), and
     older browsers may not support the API at all, so every step here
     is defensive and never blocks app startup. */
  function requestPersistentStorage(){
    try {
      if (navigator.storage && typeof navigator.storage.persist === "function"){
        navigator.storage.persist().then(function(granted){
          /* No UI needed either way — this is a best-effort background
             request. Left here (rather than removed) in case it's ever
             useful to surface to the user or log during debugging. */
        }).catch(function(){});
      }
    } catch(e){}
  }

  loadState(function(loaded){
    state = loaded;
    var changed = cleanupOldCompleted();
    if (changed) saveState();
    renderMain();
    setupFabDrag();
    setupOutsideTapCancel();
    requestPersistentStorage();
  });

  /* Tapping anywhere outside a card that has its add-task form open cancels that form. */
  function setupOutsideTapCancel(){
    document.addEventListener("pointerdown", function(e){
      var openCatIds = Object.keys(addModeCats).filter(function(id){ return addModeCats[id]; });
      if (openCatIds.length === 0) return;
      var clickedCard = e.target.closest ? e.target.closest(".card") : null;
      var clickedCatId = clickedCard ? clickedCard.getAttribute("data-catid") : null;
      openCatIds.forEach(function(catId){
        if (catId !== clickedCatId){
          delete addModeCats[catId];
          renderCard(catId);
        }
      });
    });
  }

  /* FAB: tap -> add new list. Drag onto a card -> open that card's add-task form. */
  function setupFabDrag(){
    var fab = document.getElementById("fabAdd");
    var drag = { active:false, moved:false, startX:0, startY:0, pointerId:null };

    fab.addEventListener("pointerdown", function(e){
      drag.active = true;
      drag.moved = false;
      drag.startX = e.clientX;
      drag.startY = e.clientY;
      drag.pointerId = e.pointerId;
      fab.setPointerCapture(e.pointerId);
      e.preventDefault();
    });

    fab.addEventListener("pointermove", function(e){
      if (!drag.active) return;
      var dx = e.clientX - drag.startX;
      var dy = e.clientY - drag.startY;
      if (!drag.moved && Math.hypot(dx, dy) > 12){
        drag.moved = true;
        fab.classList.add("fab-dragging");
      }
      if (drag.moved){
        fab.style.transform = "translate(" + dx + "px," + dy + "px)";
        document.querySelectorAll(".card.drop-target").forEach(function(c){ c.classList.remove("drop-target"); });
        fab.style.pointerEvents = "none";
        var el = document.elementFromPoint(e.clientX, e.clientY);
        fab.style.pointerEvents = "";
        var card = el && el.closest ? el.closest(".card") : null;
        if (card) card.classList.add("drop-target");
      }
    });

    function finish(e){
      if (!drag.active) return;
      drag.active = false;
      try { fab.releasePointerCapture(drag.pointerId); } catch(err){}
      document.querySelectorAll(".card.drop-target").forEach(function(c){ c.classList.remove("drop-target"); });
      if (drag.moved){
        fab.classList.remove("fab-dragging");
        fab.style.transform = "";
        fab.style.pointerEvents = "none";
        var el = document.elementFromPoint(e.clientX, e.clientY);
        fab.style.pointerEvents = "";
        var card = el && el.closest ? el.closest(".card") : null;
        if (card){
          var catId = card.getAttribute("data-catid");
          addModeCats[catId] = true;
          renderCard(catId);
        }
      } else {
        openAddCategoryModal();
      }
    }

    fab.addEventListener("pointerup", finish);
    fab.addEventListener("pointercancel", function(){
      drag.active = false;
      fab.classList.remove("fab-dragging");
      fab.style.transform = "";
      document.querySelectorAll(".card.drop-target").forEach(function(c){ c.classList.remove("drop-target"); });
    });
  }
})();
</script>
